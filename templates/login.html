<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TORNADO — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha512-dLxUelApnYxpLt6K2iomGngnHO83iUvZytA3YjDUCjT0HDOHKXnVYdf3hU4JjM8uEhxf9nD1/ey98U3t2vZ0qQ==" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#070708">

  {% if captcha_provider == 'turnstile' %}
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  {% elif captcha_provider == 'yandex' %}
  <script src="https://smartcaptcha.yandexcloud.net/captcha.js" defer></script>
  {% endif %}
</head>
<body>

  <div class="bg-canvas" aria-hidden="true">
    <canvas id="topo-canvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="card-window" id="cardWindow">
    <div class="login-panel">
      <!-- Мобильный заголовок с анимированным эмодзи -->
      <div class="login-emoji-header" style="display:none;">
        <div class="tg-emoji tg-emoji--xl">
          <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/main/Objects/Key.webp" alt="🔑" loading="eager">
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Dobato',sans-serif;font-size:32px;letter-spacing:3px;color:#fff;">TORNADO</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-top:2px;">Войдите в аккаунт</div>
        </div>
      </div>
      <header class="header">
        <span class="logo">TORNADO</span>
        <span class="logo-sub">Chat</span>
      </header>


      <div id="error-msg" class="error-message"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="login">Никнейм</label>
          <input type="text" id="login" class="glass-input" name="login"
                 placeholder="SayGG" required autocomplete="username">
        </div>
        <div class="form-group" style="display:none !important;" aria-hidden="true">
          <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" class="glass-input" name="password"
                 placeholder="••••••••••••" required autocomplete="current-password">
        </div>

        <div id="captcha-box" style="margin: 15px 0;">
            {% if captcha_provider == 'turnstile' %}
            <div class="cf-turnstile"
                 data-sitekey="{{ site_key }}"
                 data-theme="dark"
                 data-callback="onCaptchaSuccess"></div>
            {% elif captcha_provider == 'yandex' %}
            <div id="captcha-container"
                 class="smart-captcha"
                 data-sitekey="{{ site_key }}"
                 data-callback="onCaptchaSuccess"
                 style="height: 100px"></div>
            {% endif %}
        </div>

        <button type="submit" class="glass-btn locked" id="loginBtn" disabled>
          <span>Войти</span>
          <svg class="btn-arrow" viewBox="0 0 16 16" fill="none">
            <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>

      <div class="auth-links">Нет аккаунта? <a href="/">Создать</a></div>
    </div>

    <div class="viz-panel" id="vizPanel">
      <canvas id="three-canvas"></canvas>
      <canvas id="esp-canvas" style="position:absolute;inset:0;pointer-events:none;"></canvas>
      <div class="esp-ui">
        <div class="esp-bottom" id="esp-bottom">
          <svg class="esp-hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9V5h4M19 9V5h-4M5 15v4h4M19 15v4h-4"/></svg>
          <span id="dragHint">github.com/SayGGGo/Tornado</span>
        </div>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/bg.js') }}"></script>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
