name: Flask CI/CD | ЦТК.Space

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: pytest || echo "Тесты не найдены, но продолжаем..."

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - run: |
          cat << "EOF"
          ░█████╗░████████╗██╗░░██╗
          ██╔══██╗╚══██╔══╝██║░██╔╝
          ██║░░╚═╝░░░██║░░░█████═╝░
          ██║░░██╗░░░██║░░░██╔═██╗░
          ╚█████╔╝░░░██║░░░██║░╚██╗
          ░╚════╝░░░░╚═╝░░░╚═╝░░╚═╝
          ░██████╗██████╗░░█████╗░░█████╗░███████╗
          ██╔════╝██╔══██╗██╔══██╗██╔══██╗██╔════╝
          ╚█████╗░██████╔╝███████║██║░░╚═╝█████╗░░
          ░╚═══██╗██╔═══╝░██╔══██║██║░░██╗██╔══╝░░
          ██████╔╝██║░░░░░██║░░██║╚█████╔╝███████╗
          ╚═════╝░╚═╝░░░░░╚═╝░░╚═╝░╚════╝░╚══════╝
          EOF
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          command_timeout: 10m
          script: |
            cd /root/Tornado || exit
            git fetch --all
            git reset --hard origin/main
            ./venv/bin/pip install -r requirements.txt
            
            SERVICE_FILE="/etc/systemd/system/flask_app.service"
            if [ -f "$SERVICE_FILE" ]; then
                sudo grep -q "Restart=" "$SERVICE_FILE" || sudo sed -i '/\[Service\]/a Restart=always' "$SERVICE_FILE"
                sudo sed -i 's/^Restart=.*/Restart=always/' "$SERVICE_FILE"
                sudo grep -q "RestartSec=" "$SERVICE_FILE" || sudo sed -i '/\[Service\]/a RestartSec=5' "$SERVICE_FILE"
                sudo sed -i 's/^RestartSec=.*/RestartSec=5/' "$SERVICE_FILE"
                sudo systemctl daemon-reload
            fi
            
            sudo systemctl restart flask_app
