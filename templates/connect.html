<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — TORNADO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/connect.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#070708">
    <style>
        #dynamic-island-root {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
            pointer-events: none;
            height: 0;
            overflow: visible;
        }
    </style>
</head>
<body data-token="{{ token }}">
    <div id="dynamic-island-root"></div>

    <canvas id="topo-canvas"></canvas>
    <div class="connect-card">
        <div id="card-content">
            <div class="connect-emoji-header" style="display:none;">
                <div class="tg-emoji tg-emoji--lg">
                    <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/main/Objects/Locked%20with%20Key.webp" alt="🔐" loading="eager" onerror="this.parentElement.style.display='none'">
                </div>
            </div>
            <div class="user-profile">
                <img src="{{ user_avatar if user_avatar else 'https://ui-avatars.com/api/?name=' ~ user_fio|urlencode ~ '&background=random&color=fff&rounded=true&bold=true&uppercase=true' }}" alt="Аватарка" class="user-avatar">
                <div class="user-info">
                    <div class="user-name">{{ user_name }}</div>
                    <div class="user-email">{{ user_fio }}</div>
                </div>
            </div>

            <div class="app-header">
                {% if app_logo %}
                <img src="{{ app_logo }}" alt="Logo" class="app-logo">
                {% else %}
                <div class="app-logo placeholder-logo">🛡️</div>
                {% endif %}
                <div class="app-name">{{ app_name }}</div>
                <div class="req-text">запрашивает доступ к вашему аккаунту</div>
            </div>

            <div id="warnings-container"></div>

            <div class="req-list">
                {% for item in requested_data %}
                <div>
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                    <span>{{ item }}</span>
                </div>
                {% endfor %}
            </div>

            <div class="btn-group">
                <button class="btn btn-reject" id="btn-reject">Отклонить</button>
                <button class="btn btn-approve" id="btn-approve">Подтвердить</button>
            </div>
        </div>

        <div id="anim-container" class="anim-container"></div>
    </div>

    <script src="{{ url_for('static', filename='js/connect.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bg.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/i/island.js') }}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var appName = document.querySelector('.app-name')?.innerText?.trim() || 'Приложение';
            var warningsCount = document.getElementById('warnings-container')?.children?.length || 0;

            setTimeout(function () {
                if (!window.islandEmit) return;
                if (warningsCount > 0) {
                    window.islandEmit('island:notification', {
                        title: 'Запрос доступа',
                        body: appName + ' запрашивает разрешения. Проверьте список.'
                    });
                } else {
                    window.islandEmit('island:status', {
                        text: appName + ' · OAuth',
                        color: '#34c759',
                        autoDismiss: true
                    });
                }
            }, 600);

            var btnApprove = document.getElementById('btn-approve');
            if (btnApprove) {
                btnApprove.addEventListener('click', function () {
                    if (!window.islandEmit) return;
                    window.islandEmit('island:status', {
                        text: 'Доступ подтверждён',
                        color: '#34c759',
                        autoDismiss: true
                    });
                });
            }

            var btnReject = document.getElementById('btn-reject');
            if (btnReject) {
                btnReject.addEventListener('click', function () {
                    if (!window.islandEmit) return;
                    window.islandEmit('island:status', {
                        text: 'Доступ отклонён',
                        color: '#ff453a',
                        autoDismiss: true
                    });
                });
            }
        });
    </script>
</body>
</html>
