<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="current-user" content="{{ current_user.login }}">
    <meta name="current-user-id" content="{{ current_user.id }}">
    <meta name="current-user-premium" content="{{ current_user.premium or '' }}">
    <title>TORNADO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
    <style>
        #dynamic-island-root {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
            pointer-events: none;
            height: 0;
            overflow: visible;
        }
    </style>
    {% include 'more.html' %}
</head>
<body>
    <div id="dynamic-island-root"></div>

    <div class="container">
        {% include 'bar.html' %}

        <div class="resizer" id="resizer"></div>

        <div class="main-content" id="main-chat-connection-point">
            <canvas id="topo-canvas"></canvas>

            <div id="no-chat-selected" class="no-chat-state">
                <span>Выберите чат, чтобы начать общение</span>
            </div>

            <div class="chat-layout" id="active-chat-layout" style="display: none;">
                <div id="chat-preloader" class="chat-preloader">
                    <div class="crypto-loader">
                        <div class="crypto-ring"></div>
                        <img src="{{ url_for('static', filename='icons/logo.svg') }}" class="crypto-logo">
                    </div>
                </div>

                <div class="chat-header-wrapper">
                    <div class="chat-layout-header liquid-glass-fallback">
                        <div class="chat-user-info">
                            <img id="current-chat-avatar" src="" class="avatar" style="width: 40px; height: 40px; min-width: 40px; margin-right: 0;">
                            <span id="current-chat-name">Чат</span>
                            <div id="current-chat-premium" class="premium-icon" style="display: none;"></div>
                        </div>
                        <div class="header-actions" style="display: flex; gap: 8px;">
                            <button id="invite-to-chat-btn" class="icon-btn" style="display: none;">
                                <span class="material-symbols-outlined">person_add</span>
                            </button>
                            <button id="start-call-btn" class="icon-btn">
                                <span class="material-symbols-outlined">videocam</span>
                            </button>
                            <button class="icon-btn more-options-btn">
                                <span class="material-symbols-outlined">more_vert</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages"></div>

            </div>

            <div id="edit-bar" class="edit-bar" style="display:none;">
                <div class="edit-bar-inner">
                    <span class="material-symbols-outlined" style="color:var(--green);">edit</span>
                    <div class="edit-bar-text">
                        <span class="edit-bar-label">Редактирование</span>
                        <span id="edit-bar-content" class="edit-bar-content"></span>
                    </div>
                    <button id="edit-bar-close" class="icon-btn">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </div>

            <div id="file-preview-bar" class="file-preview-bar" style="display:none;">
                <div class="file-preview-inner">
                    <img id="file-preview-img" src="" style="display:none;">
                    <span class="material-symbols-outlined file-preview-icon" id="file-preview-icon" style="display:none;">description</span>
                    <span id="file-preview-name"></span>
                    <button id="file-preview-close" class="icon-btn">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </div>

            <div id="emoji-picker" class="emoji-picker" style="display:none;">
                <div class="emoji-picker-header">
                    <div class="emoji-tabs" id="emoji-tabs"></div>
                </div>
                <div class="emoji-grid" id="emoji-grid"></div>
            </div>

            <div class="chat-input-wrapper" id="chat-input-wrapper-el">
                <div class="chat-input-glass liquid-glass-fallback">
                    <button class="icon-btn smile-btn" id="emoji-toggle-btn">
                        <span class="material-symbols-outlined">mood</span>
                    </button>
                    <textarea id="message-input" class="chat-input" placeholder="Сообщение" rows="1"></textarea>
                    <input type="file" id="file-input" style="display:none;" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.zip,.rar,.txt,.csv,.xls,.xlsx" multiple>
                    <button class="icon-btn attach-btn" id="attach-btn">
                        <span class="material-symbols-outlined">attach_file</span>
                    </button>
                </div>
                <button id="send-btn" class="send-btn liquid-glass-fallback">
                    <span class="material-symbols-outlined mic-icon">mic</span>
                    <span class="material-symbols-outlined send-icon" style="display:none;">send</span>
                </button>
            </div>
        </div>
    </div>

    <div id="group-modal-overlay" class="modal-overlay">
        <div class="invite-modal">
            <div class="modal-top">
                <div class="modal-title">Новая группа</div>
                <button class="modal-close" id="close-group-btn">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <input type="text" id="group-name-input" placeholder="Название группы" class="modal-search">
            <div class="modal-contacts" id="group-contacts-list"></div>
            <button id="confirm-create-group" class="contact-action-btn" style="width: 100%; margin-top: 15px;">Создать группу</button>
        </div>
    </div>
    <div id="invite-chat-overlay" class="modal-overlay">
        <div class="invite-modal liquid-glass-fallback">
            <div class="modal-top">
                <div class="modal-title">Пригласить участников</div>
                <button class="modal-close" id="close-invite-chat-btn">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <input type="text" id="invite-chat-search" placeholder="Поиск контактов" class="modal-search">
            <div class="modal-contacts" id="invite-chat-contacts-list"></div>
            <button id="confirm-invite-chat" class="contact-action-btn" style="width: 100%; margin-top: 15px;">Добавить</button>
        </div>
    </div>

    <div id="chat-settings-overlay" class="modal-overlay">
        <div class="invite-modal liquid-glass-fallback">
            <div class="modal-top">
                <div class="modal-title">Параметры чата</div>
                <button class="modal-close" id="close-chat-settings-btn">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="chat-settings-header" style="text-align: center; margin-bottom: 20px;">
                <img id="settings-chat-avatar" src="" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.1);">
                <h3 id="settings-chat-name" style="margin: 0; color: #fff; font-size: 18px;"></h3>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h4 style="margin: 0; color: var(--text-muted, #aaa); font-size: 14px;">Участники</h4>
                <button id="open-invite-from-settings-btn" class="icon-btn" style="background: rgba(135,116,225,0.15); color: #8774e1; border-radius: 12px; padding: 6px 14px; font-size: 13px; width: auto; height: auto; font-weight: bold;">
                    <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 6px;">person_add</span>
                    Пригласить
                </button>
            </div>
            <div class="modal-contacts" id="settings-participants-list" style="max-height: 200px;"></div>
        </div>
    </div>

    <div id="msg-context-menu" class="context-menu">
        <div class="context-menu-item" id="ctx-edit-msg">
            <span class="material-symbols-outlined">edit</span> Редактировать
        </div>
        <div class="context-menu-item danger" id="ctx-delete-msg">
            <span class="material-symbols-outlined">delete</span> Удалить
        </div>
    </div>

    <div id="liquid-glass-root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='dist/glass-bundle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bg.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/i/island.js') }}"></script>
</body>
</html>
