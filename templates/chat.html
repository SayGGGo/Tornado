<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="current-user" content="{{ current_user.login }}">
    <title>TORNADO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Varela+Round&display=swap" rel="stylesheet">
    {% include 'more.html' %}
</head>
<body>
    <div class="container">
        {% include 'bar.html' %}

        <div class="resizer" id="resizer"></div>

        <div class="main-content" id="main-chat-connection-point">
            <canvas id="topo-canvas"></canvas>

            <div id="no-chat-selected" class="no-chat-state">
                <span>Выберите чат, чтобы начать общение</span>
            </div>

            <div class="chat-layout" id="active-chat-layout" style="display: none;">
                <div id="chat-preloader" class="chat-preloader">
                    <div class="crypto-loader">
                        <div class="crypto-ring"></div>
                        <img src="{{ url_for('static', filename='icons/logo.svg') }}" class="crypto-logo">
                    </div>
                </div>

                <div class="chat-header-wrapper">
                    <div class="chat-layout-header liquid-glass">
                        <div class="chat-user-info">
                            <img id="current-chat-avatar" src="" class="avatar" style="width: 40px; height: 40px; min-width: 40px; margin-right: 0;">
                            <span id="current-chat-name">Чат</span>
                            <div id="current-chat-premium" class="premium-icon" style="display: none;"></div>
                        </div>
                        <div class="header-actions" style="display: flex; gap: 8px;">
                            <button id="start-call-btn" class="icon-btn">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                            </button>
                            <button class="icon-btn more-options-btn">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages">
                    </div>

                </div>

                <div class="chat-input-wrapper">
                    <div class="chat-input-glass liquid-glass">
                        <button class="icon-btn smile-btn">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S8.33 8 7.5 8 6 8.67 6 9.5 6.67 11 7.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H8.39c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                        </button>
                        <input type="text" id="message-input" class="chat-input" placeholder="Сообщение" autocomplete="off">
                        <button class="icon-btn attach-btn">
                            <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
                        </button>
                    </div>
                    <button id="send-btn" class="send-btn liquid-glass">
                        <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                        <svg class="send-icon" viewBox="0 0 24 24" style="display:none;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div> <div id="liquid-glass-root"></div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='dist/glass-bundle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bg.js') }}"></script>
</body>
</html>
